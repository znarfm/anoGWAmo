name: "🐛 Bug Report"
description: Create a report to help us improve
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.
  - type: input
    id: os
    attributes:
      label: OS
      description: What operating system are you using? (e.g. Windows, macOS, Linux, Android, iOS)
  - type: input
    id: browser
    attributes:
      label: Browser
      description: What browser are you using? (e.g. Chrome, Firefox, Safari)
  - type: input
    id: version
    attributes:
      label: Version
      description: What version of the browser or app are you using?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
