<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>anoGWAmo?</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <!-- Populated by JS -->
    <div id="loading">Loading...</div>
  </div>

  <template id="tpl-empty">
    <div class="empty-state">
      <img src="../icons/icon128.png" alt="anoGWAmo logo" width="64" height="64" class="logo">
      <h2>Welcome to anoGWAmo?</h2>
      <p>We don't have your grades recorded yet.</p>
      <button id="btn-login" class="btn-primary">Calculate my GWA</button>
      <p class="muted-note">This will open PUP SIS.</p>
    </div>
  </template>

  <template id="tpl-dashboard">
    <div class="dashboard">
      <div class="header">
        <div class="branding">
          <span class="logo-emoji">🎓</span>
          <span class="title">anoGWAmo?</span>
        </div>
        <div class="mode-switcher" id="ds-mode-switcher">
          <button class="mode-btn" data-mode="C">Planner</button>
          <button class="mode-btn" data-mode="A">Manual</button>
          <button class="mode-btn" data-mode="B">Site GPA</button>
        </div>
      </div>
      <div class="main-card">
        <div class="gwa-score" id="ds-gwa">...</div>
        <div class="gwa-label">Cumulative GWA</div>
        <div class="gwa-units" id="ds-units">-- academic units</div>
      </div>
      <div class="status-card" id="ds-status-card">
        <span class="status-icon" id="ds-status-icon"></span>
        <span class="status-text" id="ds-status-text">--</span>
      </div>
      
      <div class="last-sync">
        <span id="ds-timestamp">--</span>
      </div>

      <div class="actions" style="display: flex; gap: 8px;">
        <button id="btn-export" class="btn-secondary" style="padding: 10px;" title="Export Record as PDF">📥</button>
        <div style="position:relative; width: 100%;">
           <div class="update-tooltip">Redirects to SIS. Visit the Grades page after login to sync.</div>
           <button id="btn-update" class="btn-secondary" style="width: 100%;">Update Grades</button>
        </div>
      </div>
    </div>
  </template>

  <template id="tpl-planner">
    <div class="planner-view">
      <div class="main-card">
        <div class="gwa-label" id="pl-label">Projected Final GWA</div>
        <div class="gwa-score" id="pl-gwa">...</div>
        <div class="gwa-units" id="pl-units">-- / -- units</div>
        <div class="pl-baseline-row">
          <label for="pl-global-select">Global Target:</label>
          <select id="pl-global-select" class="pl-select">
            <option value="">--</option>
            <option value="1.00">1.00</option>
            <option value="1.25">1.25</option>
            <option value="1.50">1.50</option>
            <option value="1.75">1.75</option>
            <option value="2.00">2.00</option>
            <option value="2.25">2.25</option>
            <option value="2.50">2.50</option>
            <option value="2.75">2.75</option>
            <option value="3.00">3.00</option>
          </select>
        </div>
      </div>
      
      <div class="planner-targets" id="pl-targets">
        <!-- Dynamic targets -->
      </div>

      <div class="planner-list" id="pl-list">
        <!-- Grouped pending subjects -->
      </div>
    </div>
  </template>

  <script src="popup.js"></script>
</body>
</html>
